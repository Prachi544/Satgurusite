services:
  - type: web
    name: panditji-backend
    runtime: node
    plan: free
    region: singapore
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 5000
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: PANDIT_EMAIL
        sync: false
      - key: FRONTEND_URL
        sync: false
